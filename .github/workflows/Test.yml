name: Build

on: [push]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Build
      shell: pwsh
      run: dotnet build -c Release .\AwsKickStarter.Lambda.slnx
  
    - name: Test AwsKickStarter.Lambda
      shell: pwsh
      run: |
        $workspace = $env:GITHUB_WORKSPACE
        dotnet test .\AwsKickStarter.Lambda.Tests\AwsKickStarter.Lambda.Tests.csproj -c Release --no-build --framework net10.0 -l "console;verbosity=normal" --results-directory:"$workspace/TestResults" /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput="$workspace/TestResults/coverage.xml" /p:Include=[AwsKickStarter.Lambda]* /p:Threshold=100

    - name: Report Generator
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.4
      with:
        reports: TestResults/coverage.net10.0.xml
        targetdir: TestResults/CoverageReport
        reporttypes: TextSummary

    - name: Output Coverage Report
      shell: pwsh
      run:  |
        $workspace = $env:GITHUB_WORKSPACE
        $report = Get-Content "$workspace/TestResults/CoverageReport/Summary.txt" -Raw
        Write-Host $report
